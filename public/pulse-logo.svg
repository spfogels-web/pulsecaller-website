<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1086 362" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22e0ff"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ff2bd6"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22e0ff"/>
      <stop offset="1" stop-color="#ff2bd6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mark: ring + P + EKG -->
  <g transform="translate(180 181)" filter="url(#glow)">
    <circle r="135" fill="none" stroke="url(#ringGrad)" stroke-width="6"/>
    <path d="M -45 -75 L -45 75 L -10 75 L -10 15 L 25 15 C 60 15 78 -10 78 -35 C 78 -60 60 -75 25 -75 Z M -10 -42 L 18 -42 C 36 -42 45 -36 45 -28 C 45 -20 36 -14 18 -14 L -10 -14 Z"
      fill="url(#brandGrad)"/>
    <!-- EKG line across the mark -->
    <path d="M -110 0 L -60 0 L -45 -25 L -25 30 L -5 -35 L 15 25 L 35 -10 L 60 0 L 110 0"
      fill="none" stroke="url(#brandGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(360 0)">
    <text x="0" y="160" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="120" letter-spacing="6" fill="url(#brandGrad)">PULSE CALLER</text>
    <text x="0" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" font-size="22" letter-spacing="6" fill="#cbd5e1">WINNING CALLS. REAL. TIME. REAL RESULTS.</text>
    <line x1="0" y1="240" x2="700" y2="240" stroke="url(#brandGrad)" stroke-width="2" opacity="0.6"/>
    <text x="0" y="290" font-family="ui-monospace, monospace" font-weight="500" font-size="18" letter-spacing="4" fill="#94a3b8">WE FIND THE SIGNAL.  YOU TAKE THE WIN.</text>
  </g>
</svg>
